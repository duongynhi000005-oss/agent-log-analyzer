name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: gofmt
        run: test -z "$(gofmt -l .)"
      - name: go vet
        run: go vet ./...
      - name: tests
        run: go test ./...
      - name: terraform fmt
        run: terraform -chdir=infra/aws fmt -check -recursive
      - name: terraform validate
        run: |
          terraform -chdir=infra/aws init -backend=false
          terraform -chdir=infra/aws validate
      - name: docker build
        run: docker build .
      - name: docker compose smoke
        run: ./scripts/smoke-local.sh
      - name: docker compose load smoke
        run: |
          COMPOSE_PROJECT_NAME=claude-log-analyzer-ci-load docker compose up --build -d
          set +e
          ./scripts/load-local.sh 5
          rc=$?
          set -e
          COMPOSE_PROJECT_NAME=claude-log-analyzer-ci-load docker compose down -v
          exit $rc
