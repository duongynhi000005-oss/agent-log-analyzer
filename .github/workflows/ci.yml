name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
      - name: gofmt
        run: test -z "$(gofmt -l .)"
      - name: go vet
        run: go vet ./...
      - name: tests
        run: go test ./...
      - name: npm package smoke
        run: |
          mkdir -p npm/bin
          go build -o npm/bin/agent-analyzer-linux-x64 ./cmd/agent-analyzer
          test -z "$(node -e 'const p=require("./package.json"); const s=p.scripts||{}; const bad=["preinstall","install","postinstall","prepare"].filter(k => s[k]); console.log(bad.join("\\n"))')"
          npm pack --dry-run
          node npm/bin/agent-analyzer.js version
      - name: terraform fmt
        run: terraform -chdir=infra/aws fmt -check -recursive
      - name: terraform validate
        run: |
          terraform -chdir=infra/aws init -backend=false
          terraform -chdir=infra/aws validate
      - name: aws deploy script syntax
        run: bash -n scripts/deploy-aws.sh
      - name: docker build
        run: docker buildx build --platform linux/amd64 .
      - name: docker compose smoke
        run: ./scripts/smoke-local.sh
      - name: docker compose load smoke
        run: |
          COMPOSE_PROJECT_NAME=agent-log-analyzer-ci-load docker compose up --build -d
          set +e
          ./scripts/load-local.sh 5
          rc=$?
          set -e
          COMPOSE_PROJECT_NAME=agent-log-analyzer-ci-load docker compose down -v
          exit $rc
